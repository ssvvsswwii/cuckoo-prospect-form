<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUCKOO – Thank You!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #7e171b; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fdf2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      padding: 52px 40px 44px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .check {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .check svg { width: 40px; height: 40px; }

    h1 { font-size: 26px; font-weight: 800; color: var(--brand); margin-bottom: 10px; }
    p  { font-size: 15px; color: #555; line-height: 1.6; }

    .brand {
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Thank You!</h1>
    <p>
      Your registration has been successfully submitted.<br/>
      Our team will be in touch with you shortly.
    </p>
    <div class="brand">CUCKOO</div>
  </div>
</body>
</html>
